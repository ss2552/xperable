name: C/C++ CI

on:
 workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
     - name: libusb
       run: sudo apt install libusb-1.0-0-dev -y

     - name: ls
       run: sudo ls /usr/lib/x86_64-linux-gnu
 
     - uses: actions/checkout@v4
     - name: make
       run: make
 
     - name: out
       uses: actions/upload-artifact@v4
       with:
         name: out
         path: xperable
